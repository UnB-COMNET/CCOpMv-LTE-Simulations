[Config ilp_fixed_sliced_5_video_slice9]
sim-time-limit = 1s
repeat = 1

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
**.eNB*.cellularNic.channelModel[*].rcvdSinr:vector.vector-recording = true
**.app[*].throughput:vector.vector-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
output-scalar-file = ${resultdir}/ilp_fixed_sliced_5_video/5-${RBs}-${repetition}-${Slice}.sca
output-vector-file = ${resultdir}/ilp_fixed_sliced_5_video/5-${RBs}-${repetition}-${Slice}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/ilp_fixed_sliced_5_video/5-${RBs}-${repetition}-${Slice}.elog

############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/ilp_fixed_sliced_5_video-cmdout/5-${RBs}-${repetition}-${Slice}.out

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_fixed_sliced_5_video-RBs_${RBs}-Slice_${Slice}-5-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0
**.cellularNic.channelModel[*].num_slice = ${Slice = 9}
**.cellularNic.channelModel[*].num_enbs = ${NumEnbs= 4 ! Slice}
network = _5G.networks.chosen_seed_123.micro_power_30.ILPFixedNet5Slice9

