############### UEs ###############
**.numUe = 2

# Conecting UEs to eNodeB
**.ue[0].macCellId = 1
**.ue[0].masterId = 1
**.ue[1].macCellId = 1
**.ue[1].masterId = 1

# Scheduler
**.schedulingDisciplineUl = ${sched= "MAXCI"}
**.schedulingDisciplineDl = ${sched}

############### Scenario ###############

# eNodeB
**.eNB.cellularNic.channelModel[*].scenario = "URBAN_MACROCELL"

# UEs
**.ue[0].cellularNic.channelModel[*].scenario = "URBAN_MACROCELL"
**.ue[1].cellularNic.channelModel[*].scenario = "URBAN_MACROCELL"

############### Mobility ###############

# eNodeB
*.eNB.mobility.initialX = ${iniX= 400.0m, 1200.0m, 2000.0m, 2800.0m, 3600.0m, 4400.0m, 5200.0m, 6000.0m, 6800.0m, 7600.0m}
*.eNB.mobility.initialY = ${iniY= 400.0m, 1200.0m, 2000.0m, 2800.0m, 3600.0m, 4400.0m, 5200.0m, 6000.0m, 6800.0m, 7600.0m}
*.eNB.mobility.initialZ = ${iniZ= 25m}
*.eNB.mobility.initFromDisplayString = false
*.eNB*.mobility.constraintAreaMaxX = 8000 m
*.eNB*.mobility.constraintAreaMaxY = 8000 m
*.eNB*.mobility.constraintAreaMaxZ = inf m
*.eNB*.mobility.constraintAreaMinX = 0 m
*.eNB*.mobility.constraintAreaMinY = 0 m
*.eNB*.mobility.constraintAreaMinZ = -inf m

# UEs

*.ue[*].mobilityType = "StationaryMobility"
*.ue[0].mobility.initialX = 400.0m
*.ue[0].mobility.initialY = 400.0m
*.ue[0].mobility.initialZ = 0m
*.ue[0].mobility.initFromDisplayString = false
*.ue[1].mobility.initialX = 1200.0m
*.ue[1].mobility.initialY = 400.0m
*.ue[1].mobility.initialZ = 0m
*.ue[1].mobility.initFromDisplayString = false

*.ue[*].mobility.constraintAreaMaxX = 8000 m
*.ue[*].mobility.constraintAreaMaxY = 8000 m
*.ue[*].mobility.constraintAreaMaxZ = inf m
*.ue[*].mobility.constraintAreaMinX = 0 m
*.ue[*].mobility.constraintAreaMinY = 0 m
*.ue[*].mobility.constraintAreaMinZ = -inf m

############### Apps ###############
*.ue[*].numApps = 2
*.server.numApps = 2 * 2 * 1

# VoIP UL
*.ue[*].app[0].typename="VoIPSender"
*.ue[*].app[0].PacketSize = default
*.ue[*].app[0].destAddress = "server"
*.ue[*].app[0].destPort = 4000 + ancestorIndex(1) #Pega o valor id de ue
*.ue[*].app[0].localPort = 4888
*.ue[*].app[0].startTime = 0.01s
*.server.app[0..1].typename="VoIPReceiver"
*.server.app[0..1].localPort = 4000 + ancestorIndex(0) - 0

# VoIP DL
*.server.app[2..3].typename="VoIPSender"
*.server.app[2..3].PacketSize = default
*.server.app[2..3].destAddress = "ue[" + string(ancestorIndex(0) - 2) + "]"
*.server.app[2..3].destPort = 3000
*.server.app[2..3].localPort = 3088 + ancestorIndex(0)
*.server.app[2..3].startTime = 0.01s
*.ue[*].app[1].typename="VoIPReceiver"
*.ue[*].app[1].localPort = 3000
