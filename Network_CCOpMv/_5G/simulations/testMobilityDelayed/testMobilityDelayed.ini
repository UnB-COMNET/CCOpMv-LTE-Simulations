#Function: ilp_sliced_ini
#Parameters:
#   filename: ../Network_CCOpMv/_5G/simulations/chosen_seed_213/micro_power_30/ilp_fixed_sliced_10.ini
#   seed: 213
#   size_y: 4000
#   size_x: 4000
#   size_sector: 400
#   n_macros: 1
#   min_sinr: 10
#   repetitions: 2
#   multi_carriers: False
#   slice_time: 1
#   is_micro: True
#   p_size: 1428
#   app: video
#   target_f: 10
#   extra_config_name: video
#   result_dir: Solutions/chosen_seed_213/micro_power_30
#   varying: False
#   network_name: ILPFixedNet10
#   net_dir: _5G/networks/chosen_seed_213/micro_power_30
#   cmdenv_config: True
#   micro_power: 30
#   xml_filename: ilp_move_users-213.sna
#   num_bands: [100]
#Extra = Using 1 macros with 60 ues each. Slicing 10s in 10 different simulations. Using microcells.
[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/${configname}/${repetition}.elog
seed-set = ${repetition}

[Config ilp_fixed_sliced_10_video]
network = _5G.networks.chosen_seed_213.micro_power_30.ILPFixedNet10
sim-time-limit = 10s
repeat = 2
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 213

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
**.eNB*.cellularNic.channelModel[*].rcvdSinr:vector.vector-recording = true
**.app[*].throughput:vector.vector-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
output-scalar-file = ${resultdir}/${configname}/10-${RBs}-${repetition}-${Slice}.sca
output-vector-file = ${resultdir}/${configname}/10-${RBs}-${repetition}-${Slice}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/${configname}/10-${RBs}-${repetition}-${Slice}.elog

############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/${configname}-cmdout/10-${RBs}-${repetition}-${Slice}.out

############### Snapshots ###############
snapshot-file = ../../../Functions/${configname}-RBs_${RBs}-Slice_${Slice}-10-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30
**.cellularNic.phy.txDirection = "OMNI"

############### Channel Control ###############
**.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].carrierFrequency = 0.7GHz

############### Channel Model ###############
