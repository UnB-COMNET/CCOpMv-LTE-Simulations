[General]
image-path=../../images
tkenv-plugin-path = ../../../inet/etc/plugins
#record-eventlog = true
tkenv-default-config = 
output-scalar-file-append = false
print-undisposed = true
**.vector-recording = false
**.routingRecorder.enabled = false

#============= Simulation parameters ================
sim-time-limit=5s
warmup-period=2s
repeat = 1

#============= Mobility parameters ================
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m

#============= AMC module parameters ================
**.rbAllocationType = "localized"
**.cellInfo.numRbDl = 6
**.cellInfo.numRbUl = 6
**.numBands = 6

#============= Statistics ================
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
seed-set = ${repetition}

#####################################
# SingleCell Configuration			#
#####################################
[Config SingleCell]
network = _5G.networks.UrbanMacro5G

*.numUe = ${numUEs=1}

#============= Amount of applications ================
*.ue[*].numApps = 1
*.server.numApps = ${numUEs} # applications on server should be equal to (numUEs)*(ue[*].numUdpApps) 

# connect each UE to the eNB
**.ue[0].macCellId = 1
**.ue[0].masterId = 1

#============= Positioning and mobility ============
*.eNB.mobility.initFromDisplayString = false
*.eNB.mobility.initialX = 300m
*.eNB.mobility.initialY = 300m
*.ue[0].mobility.constraintAreaMaxX = 600m
*.ue[0].mobility.constraintAreaMaxY = 600m
*.ue[0].mobility.constraintAreaMinX = 0m
*.ue[0].mobility.constraintAreaMinY = 0m
*.ue[0].mobility.initFromDisplayString = false
*.ue[0].mobility.initialX = uniform(0m,600m)
*.ue[0].mobility.initialY = uniform(0m,600m)
*.ue[0].mobility.speed = 1mps
*.ue[0].mobilityType = "LinearMobility"
#------------------------------------#

[Config SingleCell-DL]
extends = SingleCell

*.ue[*].app[0].typename = "VoIPReceiver"
*.server.app[0].destAddress = "ue[" + string(ancestorIndex(0)) + "]"
*.server.app[0].localPort = 3088+ancestorIndex(0) 
*.server.app[0].typename = "VoIPSender"
*.server.app[0].startTime = uniform(0s,0.02s)

