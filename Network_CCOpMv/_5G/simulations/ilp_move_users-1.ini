#Function: ilp_move_users
#Parameters:
#   filename: ../Network_CCOpMv/_5G/simulations/ilp_move_users-1.ini
#   seed: 1
#   size_y: 4000
#   size_x: 4000
#   size_sector: 400
#   n_macros: 1
#   config_name: ilp_move_users
#   num_slices: 10
#Extra = Using 1 macros with 60 ues each.
[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/${configname}/${repetition}.elog
seed-set = ${repetition}

[Config ilp_move_users]
network = _5G.networks.SimpleNet
sim-time-limit = 10s
repeat = 1
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 1

output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/${configname}/${repetition}.elog

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_move_users-1.sna
**.snapshotter.snapshot = true
**.snapshotter.delay = 1

############### Transmission Power ###############
