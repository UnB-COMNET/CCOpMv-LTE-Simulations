output-vector-file = ${resultdir}/ilp_fixed_sliced_10_video/10-${RBs}-${repetition}-${Slice}-.vec
**.vector-recording = false
eventlog-file = ${resultdir}/ilp_fixed_sliced_10_video/10-${RBs}-${repetition}-${Slice}-.elog

############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/ilp_fixed_sliced_10_video-cmdout/10-${RBs}-${repetition}-${Slice}-.out

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_fixed_sliced_10_video-RBs_${RBs}-Slice_${Slice}-10-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0
**.cellularNic.channelModel[*].num_slice = ${Slice = 9}
**.cellularNic.channelModel[*].num_enbs = ${NumEnbs= 5 ! Slice}
network = _5G.networks.disaster_percentage_0.micro_power_30.chosen_seed_9.ILPFixedNet10Slice9

