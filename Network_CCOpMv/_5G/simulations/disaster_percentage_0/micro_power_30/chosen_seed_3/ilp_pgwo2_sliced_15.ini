#Extra = Using 1 macros with 60 ues each. Slicing 10s in 10 different simulations. Using microcells.

[General]
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 3

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30
**.cellularNic.phy.txDirection = "OMNI"

############### Channel Control ###############
**.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].carrierFrequency = 0.7GHz

############### Channel Model ###############
**.cellularNic.LteChannelModelType = "MoreInfoChannelModel"
**.cellularNic.channelModel[*].building_height = 20
**.cellularNic.channelModel[*].nodeb_height = 18
**.cellularNic.channelModel[*].ue_height = 1.5
**.cellularNic.channelModel[*].street_wide = 20
**.cellularNic.channelModel[*].fading_type = "JAKES"
**.cellularNic.channelModel[*].extCell_interference = false
**.cellularNic.channelModel[*].antennGainEnB = 18
**.cellularNic.channelModel[*].antennGainMicro = 5
**.cellularNic.channelModel[*].antennaGainUe = -1
**.cellularNic.channelModel[*].bs_noise_figure = 9
**.cellularNic.channelModel[*].cable_loss = 2
**.cellularNic.channelModel[*].componentCarrierIndex = 0
**.cellularNic.channelModel[*].correlation_distance = 50
**.cellularNic.channelModel[*].d2d_interference = true
**.cellularNic.channelModel[*].delay_rms = 363e-9
**.cellularNic.channelModel[*].downlink_interference = ${Inter= false}
**.cellularNic.channelModel[*].dynamic_los = false
**.cellularNic.channelModel[*].enable_extCell_los = true
**.cellularNic.channelModel[*].fading = true
**.cellularNic.channelModel[*].fading_paths = 6
**.cellularNic.channelModel[*].fixed_los = false
**.cellularNic.channelModel[*].harqReduction = 0.2
**.cellularNic.channelModel[*].inside_building = false
**.cellularNic.channelModel[*].lambdaMaxTh = 0.2
**.cellularNic.channelModel[*].lambdaMinTh = 0.02
**.cellularNic.channelModel[*].lambdaRatioTh = 20
**.cellularNic.channelModel[*].rsrqScale = 1.0
**.cellularNic.channelModel[*].rsrqShift = 22
**.cellularNic.channelModel[*].shadowing = true
**.cellularNic.channelModel[*].targetBler = 0.01
**.cellularNic.channelModel[*].thermalNoise = -104.5
**.cellularNic.channelModel[*].tolerateMaxDistViolation = true
**.cellularNic.channelModel[*].ue_noise_figure = 7
**.cellularNic.channelModel[*].uplink_interference = ${Inter}
**.cellularNic.channelModel[*].useRsrqFromLog = false
**.cellularNic.channelModel[*].useTorus = false

############### Resource Blocks ###############
**.numBands = ${RBs= 100}

############### UEs ###############
**.numUe = 180

# Scheduler
**.schedulingDisciplineUl = ${sched= "MAXCI"}
**.schedulingDisciplineDl = ${sched}

