#   size_y: 4000
#   size_x: 4000
#   size_sector: 400
#   n_macros: 1
#   min_sinr: 5
#   repetitions: 1
#   multi_carriers: False
#   slice_time: 1
#   is_micro: True
#   p_size: 1428
#   app: video
#   target_f: 10
#   extra_config_name: video
#   result_dir: Solutions/disaster_percentage_0/micro_power_30/chosen_seed_7
#   mode: single
#   network_name: ILPSingleNet5
#   net_dir: _5G/networks/disaster_percentage_0/micro_power_30/chosen_seed_7
#   cmdenv_config: True
#   micro_power: 30
#   xml_filename: ilp_move_users-7.sna
#   num_bands: [100]
#Extra = Using 1 macros with 60 ues each. Slicing 10s in 10 different simulations. Using microcells.
[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/${configname}/${repetition}.elog
seed-set = ${repetition}

[Config ilp_single_sliced_5_video]
network = _5G.networks.disaster_percentage_0.micro_power_30.chosen_seed_7.ILPSingleNet5
sim-time-limit = 1s
repeat = 1
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 7

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
**.eNB*.cellularNic.channelModel[*].rcvdSinr:vector.vector-recording = true
**.app[*].throughput:vector.vector-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
output-scalar-file = ${resultdir}/ilp_single_sliced_5_video/5-${RBs}-${repetition}-${Slice}.sca
output-vector-file = ${resultdir}/ilp_single_sliced_5_video/5-${RBs}-${repetition}-${Slice}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/ilp_single_sliced_5_video/5-${RBs}-${repetition}-${Slice}.elog

############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/ilp_single_sliced_5_video-cmdout/5-${RBs}-${repetition}-${Slice}.out

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_single_sliced_5_video-RBs_${RBs}-Slice_${Slice}-5-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30
**.cellularNic.phy.txDirection = "OMNI"

############### Channel Control ###############
**.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].carrierFrequency = 0.7GHz

