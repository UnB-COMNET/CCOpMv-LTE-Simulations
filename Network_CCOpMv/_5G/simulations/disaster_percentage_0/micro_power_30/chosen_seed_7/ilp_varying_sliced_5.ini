[Config ilp_varying_sliced_5_video_slice3]
sim-time-limit = 1s
repeat = 1

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
**.eNB*.cellularNic.channelModel[*].rcvdSinr:vector.vector-recording = true
**.app[*].throughput:vector.vector-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
output-scalar-file = ${resultdir}/ilp_varying_sliced_5_video/5-${RBs}-${repetition}-${Slice}.sca
output-vector-file = ${resultdir}/ilp_varying_sliced_5_video/5-${RBs}-${repetition}-${Slice}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/ilp_varying_sliced_5_video/5-${RBs}-${repetition}-${Slice}.elog

############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/ilp_varying_sliced_5_video-cmdout/5-${RBs}-${repetition}-${Slice}.out

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_varying_sliced_5_video-RBs_${RBs}-Slice_${Slice}-5-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0
**.cellularNic.channelModel[*].num_slice = ${Slice = 3}
**.cellularNic.channelModel[*].num_enbs = ${NumEnbs= 3 ! Slice}
network = _5G.networks.disaster_percentage_0.micro_power_30.chosen_seed_7.ILPVaryingNet5Slice3

