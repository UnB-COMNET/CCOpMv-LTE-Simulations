[Config ilp_varying_sliced_5_video_slice1]
sim-time-limit = 1s
repeat = 1

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
**.eNB*.cellularNic.channelModel[*].rcvdSinr:vector.vector-recording = true
**.app[*].throughput:vector.vector-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
output-scalar-file = ${resultdir}/ilp_varying_sliced_5_video/5-${RBs}-${repetition}-${Slice}.sca
output-vector-file = ${resultdir}/ilp_varying_sliced_5_video/5-${RBs}-${repetition}-${Slice}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/ilp_varying_sliced_5_video/5-${RBs}-${repetition}-${Slice}.elog

############### Cmdenv ###############
