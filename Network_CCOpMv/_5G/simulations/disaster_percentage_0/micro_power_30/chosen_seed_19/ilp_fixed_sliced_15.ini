**.vector-recording = false
eventlog-file = ${resultdir}/ilp_fixed_sliced_15_video/15-${RBs}-${repetition}-${Slice}-.elog

############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/ilp_fixed_sliced_15_video-cmdout/15-${RBs}-${repetition}-${Slice}-.out

############### Snapshots ###############
