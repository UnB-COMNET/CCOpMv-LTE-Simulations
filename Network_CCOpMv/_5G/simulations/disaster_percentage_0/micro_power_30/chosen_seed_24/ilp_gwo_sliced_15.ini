[General]
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 24

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30
**.cellularNic.phy.txDirection = "OMNI"

