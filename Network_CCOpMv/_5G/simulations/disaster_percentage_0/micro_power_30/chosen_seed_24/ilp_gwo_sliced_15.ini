**.server.app[183..365].videoSize = 10MiB
**.server.app[183..365].localPort = 3088 + ancestorIndex(0)
**.server.app[183..365].sendInterval = 1.1424ms
**.server.app[183..365].packetLen = 1428B
**.mtu = 1428B

[Config ilp_gwo_sliced_15_video_slice6]
sim-time-limit = 1s
repeat = 1

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
**.eNB*.cellularNic.channelModel[*].rcvdSinr:vector.vector-recording = true
**.app[*].throughput:vector.vector-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
output-scalar-file = ${resultdir}/ilp_gwo_sliced_15_video/15-${RBs}-${repetition}-${Slice}-.sca
output-vector-file = ${resultdir}/ilp_gwo_sliced_15_video/15-${RBs}-${repetition}-${Slice}-.vec
**.vector-recording = false
eventlog-file = ${resultdir}/ilp_gwo_sliced_15_video/15-${RBs}-${repetition}-${Slice}-.elog

############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/ilp_gwo_sliced_15_video-cmdout/15-${RBs}-${repetition}-${Slice}-.out

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_gwo_sliced_15_video-RBs_${RBs}-Slice_${Slice}-15-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0
**.cellularNic.channelModel[*].num_slice = ${Slice = 6}
**.cellularNic.channelModel[*].num_enbs = ${NumEnbs= 10 ! Slice}
network = _5G.networks.disaster_percentage_0.micro_power_30.chosen_seed_24.ILPGwoNet15Slice6

