**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0
**.cellularNic.channelModel[*].num_slice = ${Slice = 9}
**.cellularNic.channelModel[*].num_enbs = ${NumEnbs= 8 ! Slice}
