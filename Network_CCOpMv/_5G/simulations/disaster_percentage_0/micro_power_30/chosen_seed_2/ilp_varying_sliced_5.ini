############### Apps ###############
*.ue[*].numApps = 2
*.server.numApps = 2 * 60 * 1

# Video Streaming UL
**.server.app[0..59].typename = "UdpVideoStreamClient"
**.server.app[0..59].serverAddress = "ue[" + string(ancestorIndex(0) - 0) + "]"
**.server.app[0..59].localPort = 9000 + ancestorIndex(0)
**.server.app[0..59].serverPort = 4088
**.server.app[0..59].startTime = 0.001s
**.ue[*].app[0].typename = "UdpVideoStreamServer"
**.ue[*].app[0].videoSize = 10MiB
**.ue[*].app[0].localPort = 4088
**.ue[*].app[0].sendInterval = 1.1424ms
**.ue[*].app[0].packetLen = 1428B

# Video Streaming DL
**.ue[*].app[1].typename = "UdpVideoStreamClient"
**.ue[*].app[1].serverAddress = "server"
**.ue[*].app[1].localPort = 9000
**.ue[*].app[1].serverPort = 3088 + ancestorIndex(1) + 60
**.ue[*].app[1].startTime = 0.001s
**.server.app[60..119].typename = "UdpVideoStreamServer"
**.server.app[60..119].videoSize = 10MiB
**.server.app[60..119].localPort = 3088 + ancestorIndex(0)
**.server.app[60..119].sendInterval = 1.1424ms
**.server.app[60..119].packetLen = 1428B
**.mtu = 1428B

[Config ilp_varying_sliced_5_video_slice0]
sim-time-limit = 1s
repeat = 1

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
**.eNB*.cellularNic.channelModel[*].rcvdSinr:vector.vector-recording = true
**.app[*].throughput:vector.vector-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
