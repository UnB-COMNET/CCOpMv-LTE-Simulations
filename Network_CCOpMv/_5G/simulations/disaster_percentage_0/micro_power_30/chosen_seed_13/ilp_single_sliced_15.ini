seed-set = ${repetition}

[Config ilp_single_sliced_15_video]
network = _5G.networks.disaster_percentage_0.micro_power_30.chosen_seed_13.ILPSingleNet15
sim-time-limit = 1s
repeat = 1
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 13

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
