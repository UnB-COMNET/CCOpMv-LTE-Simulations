**.server.app[0..200].typename = "UdpVideoStreamClient"
**.server.app[0..200].serverAddress = "ue[" + string(ancestorIndex(0) - 0) + "]"
**.server.app[0..200].localPort = 9000 + ancestorIndex(0)
**.server.app[0..200].serverPort = 4088
