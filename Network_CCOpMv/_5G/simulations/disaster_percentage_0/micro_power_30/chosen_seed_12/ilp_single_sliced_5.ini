eventlog-file = ${resultdir}/${configname}/${repetition}.elog
seed-set = ${repetition}

[Config ilp_single_sliced_5_video]
network = _5G.networks.disaster_percentage_0.micro_power_30.chosen_seed_12.ILPSingleNet5
sim-time-limit = 1s
repeat = 1
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 12

############### Outputs ###############
**.eNB*.cellularNic.channelModel[*].idRcvdSinr:vector.vector-recording = true
