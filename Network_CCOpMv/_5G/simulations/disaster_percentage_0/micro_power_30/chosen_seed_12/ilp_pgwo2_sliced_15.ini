############### Cmdenv ###############
cmdenv-performance-display = false
cmdenv-redirect-output = true
cmdenv-output-file = ${resultdir}/ilp_pgwo2_sliced_15_video-cmdout/15-${RBs}-${repetition}-${Slice}-.out

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_pgwo2_sliced_15_video-RBs_${RBs}-Slice_${Slice}-15-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0
**.cellularNic.channelModel[*].num_slice = ${Slice = 2}
**.cellularNic.channelModel[*].num_enbs = ${NumEnbs= 9 ! Slice}
