#Function: ilp_fixed_info
#Parameters: 
#  filename = '../Network_CCOpMv/_5G/simulations/test_ILP.ini'
#  seed = 123
#  Map height distance = 1000
#  Map width distance = 1000
#  Region side distance = 500
[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
seed-set = ${repetition}

[Config ilp_fixed_info]
network = _5G.networks.SimpleNet
sim-time-limit = 10s
repeat = 1
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 123

output-scalar-file = ${resultdir}/${configname}/${iniX}-${iniY}-${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${iniX}-${iniY}-${repetition}.vec
**.vector-recording = false

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30
*.eNB.cellularNic.phy.txDirection = "OMNI"
############### Resource Blocks ###############
**.numBands = 6

############### Carrier Aggregation ###############
