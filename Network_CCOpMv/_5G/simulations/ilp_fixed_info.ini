#Function: ilp_fixed_info
#Parameters: 
#  filename = '../Network_CCOpMv/_5G/simulations/ilp_fixed_info.ini'
#  seed = 123
#  Map height distance = 1000
#  Map width distance = 1000
#  Region side distance = 100
[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
seed-set = ${repetition}

############### Resource Blocks ###############
**.numRbDl = 6
**.numRbUl = 6
**.binder.numBands = 6 # this value should be kept equal to the number of RBs

[Config ilp_fixed_info]
network = _5G.networks.UrbanMacro5G
