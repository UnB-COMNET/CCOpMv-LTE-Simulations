#   config_name: ilp_move_users
#Extra = Using 1 macros with 180 ues each.
[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/${configname}/${repetition}.elog
seed-set = ${repetition}

[Config ilp_move_users]
network = _5G.networks.SimpleNet
sim-time-limit = 1200s
repeat = 1
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 3

output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
eventlog-file = ${resultdir}/${configname}/${repetition}.elog

############### Snapshots ###############
snapshot-file = ../../../Functions/ilp_move_users-3.sna
**.snapshotter.snapshot = true
**.snapshotter.delay = 100

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30
**.cellularNic.phy.txDirection = "OMNI"

############### Channel Control ###############
**.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].carrierFrequency = 0.7GHz

############### Channel Model ###############
**.cellularNic.LteChannelModelType = "LteRealisticChannelModel"
