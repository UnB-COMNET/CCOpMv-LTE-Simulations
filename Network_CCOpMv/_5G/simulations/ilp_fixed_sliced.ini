#Function: ilp_fixed
#Parameters: 
#  filename = '../Network_CCOpMv/_5G/simulations/ilp_fixed_sliced.ini'
#  seed = 123
#  Map height distance = 4000
#  Map width distance = 4000
#  Region side distance = 400
#  Extra = Using 1 macros with 60 ues each.
[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
seed-set = ${repetition}

[Config ilp_fixed_10]
network = _5G.networks.ILPFixedNet
sim-time-limit = 10s
repeat = 5
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 123

**.eNB*.cellularNic.channelModel[*].*.vector-recording = true
output-scalar-file = ${resultdir}/${configname}/10-${repetition}-${RBs}.sca
output-vector-file = ${resultdir}/${configname}/10-${repetition}-${RBs}.vec
**.vector-recording = false

############### Snapshots ###############
snapshot-file = ../../../Functions/${configname}-${iterationvarsf}-10-${repetition}.sna
**.snapshotter.snapshot = false
**.snapshotter.delay = 1.0

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30
**.cellularNic.phy.txDirection = "OMNI"

############### Channel Control ###############
**.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].carrierFrequency = 0.7GHz

############### Channel Model ###############
**.cellularNic.LteChannelModelType = "MoreInfoChannelModel"
**.cellularNic.channelModel[*].building_height = 20
**.cellularNic.channelModel[*].nodeb_height = 25
**.cellularNic.channelModel[*].ue_height = 1.5
**.cellularNic.channelModel[*].street_wide = 20
