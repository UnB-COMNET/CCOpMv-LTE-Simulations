############### Apps ###############
*.ue[*].numApps = 2
*.server.numApps = 2 * 6 * 1

# VoIP UL
*.ue[*].app[0].typename="VoIPSender"
*.ue[*].app[0].PacketSize = default
*.ue[*].app[0].destAddress = "server"
*.ue[*].app[0].destPort = 4000 + ancestorIndex(1) #Pega o valor id de ue
*.ue[*].app[0].localPort = 4888
*.ue[*].app[0].startTime = 0.01s
*.server.app[0..5].typename="VoIPReceiver"
*.server.app[0..5].localPort = 4000 + ancestorIndex(0) - 0

# VoIP DL
*.server.app[6..11].typename="VoIPSender"
*.server.app[6..11].PacketSize = default
*.server.app[6..11].destAddress = "ue[" + string(ancestorIndex(0) - 6) + "]"
*.server.app[6..11].destPort = 3000
*.server.app[6..11].localPort = 3088 + ancestorIndex(0)
*.server.app[6..11].startTime = 0.01s
*.ue[*].app[1].typename="VoIPReceiver"
*.ue[*].app[1].localPort = 3000

############### Channel Control ###############
**.propagationModel = "LogNormalShadow"
