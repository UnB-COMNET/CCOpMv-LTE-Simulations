[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
seed-set = ${repetition}

############### Resource Blocks ###############
**.numRbDl = 6
**.numRbUl = 6
**.binder.numBands = 6 # this value should be kept equal to the number of RBs

[Config UrbanMacrocell5G]
network = networks.UrbanMacro5G
sim-time-limit = 20s
repeat = 10
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 123

output-scalar-file = ${resultdir}/${configname}/${sched}-${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${sched}-${repetition}.vec
**.vector-recording = false

############### Micro Cell ###############
**.microCell.cellInfo.microCell = true

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30

############### UEs ###############
**.numUe = 6

# Conecting UEs to eNodeB
**.ue[0].macCellId = 1
**.ue[0].masterId = 1
**.ue[1].macCellId = 2
**.ue[1].masterId = 2
**.ue[2].macCellId = 2
**.ue[2].masterId = 2
**.ue[3].macCellId = 2
**.ue[3].masterId = 2
**.ue[4].macCellId = 2
**.ue[4].masterId = 2
**.ue[5].macCellId = 2
**.ue[5].masterId = 2

# Scheduler
**.schedulingDisciplineUl = ${sched= "MAXCI", "DRR", "PF", "ALLOCATOR_BESTFIT"}
**.schedulingDisciplineDl = ${sched}

############### Mobility ###############

# eNodeB
**.eNB.cellularNic.channelModel[*].scenario = "URBAN_MACROCELL"

# Microcell
**.microCell.cellularNic.channelModel[*].scenario = "URBAN_MICROCELL"

# UEs
**.ue[0].cellularNic.channelModel[*].scenario = "URBAN_MACROCELL"
**.ue[1].cellularNic.channelModel[*].scenario = "URBAN_MICROCELL"
**.ue[2].cellularNic.channelModel[*].scenario = "URBAN_MICROCELL"
**.ue[3].cellularNic.channelModel[*].scenario = "URBAN_MICROCELL"
**.ue[4].cellularNic.channelModel[*].scenario = "URBAN_MICROCELL"
**.ue[5].cellularNic.channelModel[*].scenario = "URBAN_MICROCELL"

