[General]
#scheduler-class = "inet::cRealTimeScheduler" #so that speed appears realistic
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
seed-set = ${repetition}

#*.numHosts = 2
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 6000m
**.constraintAreaMaxY = 4000m
**.constraintAreaMaxZ = 0m
#**.updateInterval = 0.1s # test with 0s too, and let getCurrentPosition update the display string from a test module

#**.mobility.initFromDisplayString = false

[Config MassMobilityWithScenario]
network = UrbanMacro5G
sim-time-limit = 30s
repeat = 1
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 123

**.ue[*].mobility.typename = "MassMobility"
**.ue[*].mobility.initFromDisplayString = false
**.ue[*].mobility.changeInterval = truncnormal(2s, 0.5s)
**.ue[*].mobility.angleDelta = normal(0deg, 30deg)
**.ue[*].mobility.speed = truncnormal(15mps, 5mps)
**.scenarioManager.script = xmldoc("scenario.xml")

############### Resource Blocks ###############
#**.numRbDl = 6
#**.numRbUl = 6
#**.binder. = 6 # this value should be kept equal to the number of RBs
**.rbAllocationType = "localized"
**.cellInfo.numRbDl = 6
**.cellInfo.numRbUl = 6
**.numBands = 6

output-scalar-file = ${resultdir}/${configname}/${sched}-${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${sched}-${repetition}.vec
**.vector-recording = false

############### Micro Cell ###############
**.microCell.cellInfo.microCell = true

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30

############### UEs ###############
**.numUe = 2#
*.numHosts = 2#5

# Conecting UEs to eNodeB
**.ue[0].macCellId = 1
**.ue[0].masterId = 1

# Scheduler
**.schedulingDisciplineUl = ${sched= "MAXCI", "DRR"}#, "PF", "ALLOCATOR_BESTFIT"}
**.schedulingDisciplineDl = ${sched}

############### Mobility ###############

# eNodeB
**.eNB.cellularNic.channelModel[*].scenario = "URBAN_MACROCELL"

# Microcell
**.microCell.cellularNic.channelModel[*].scenario = "URBAN_MICROCELL"

# UEs
**.ue[0].cellularNic.channelModel[*].scenario = "URBAN_MACROCELL"

############### Mobility ###############

# eNodeB
*.eNB.mobility.initFromDisplayString = false
*.eNB.mobility.initialX = 500m
*.eNB.mobility.initialY = 500m
*.eNB.mobility.initialZ = 0m
*.eNB.mobility.constraintAreaMaxX = 10000m
*.eNB.mobility.constraintAreaMaxY = 10000m
*.eNB.mobility.constraintAreaMaxZ = 0m
*.eNB.mobility.constraintAreaMinX = 0m
*.eNB.mobility.constraintAreaMinY = 0m
*.eNB.mobility.constraintAreaMinZ = 0m

# UEs

*.ue[*].mobilityType = "LinearMobility"
*.ue[0].mobility.initialX = 419.12325912955396m
*.ue[0].mobility.initialY = 481.2794571150647m
*.ue[0].mobility.initialMovementHeading = 0

#*.ue[0].mobility.initialZ = 0.0m
#*.ue[1].mobility.initialX = 469.06595025706173m
#*.ue[1].mobility.initialY = 820.3356365480101m
#*.ue[1].mobility.initialZ = 0.0m
*.ue[*].mobility.initFromDisplayString = false
*.ue[*].mobility.constraintAreaMaxX = 10000m
*.ue[*].mobility.constraintAreaMaxY = 10000m
*.ue[*].mobility.constraintAreaMaxZ = 0m
*.ue[*].mobility.constraintAreaMinX = 0m
*.ue[*].mobility.constraintAreaMinY = 0m
*.ue[*].mobility.constraintAreaMinZ = 0m

# Microcell
*.microCell.mobility.initialX = 711.4515923921631m
*.microCell.mobility.initialY = 669.8418901148484m
*.microCell.mobility.initialZ = 0m
*.microCell.mobility.initFromDisplayString = false
*.microCell.mobility.constraintAreaMaxX = 10000m
*.microCell.mobility.constraintAreaMaxY = 10000m
*.microCell.mobility.constraintAreaMaxZ = 0m
*.microCell.mobility.constraintAreaMinX = 0m
*.microCell.mobility.constraintAreaMinY = 0m
*.microCell.mobility.constraintAreaMinZ = 0m

############### Apps ###############
*.ue[*].numApps = 2
#*.server.numApps = 2 * 200 * 1
*.server.numApps = 2 * 1 * 1

# VoIP UL
*.ue[*].app[0].typename="VoIPSender"
*.ue[*].app[0].PacketSize = default
*.ue[*].app[0].destAddress = "server"
*.ue[*].app[0].destPort = 4000 + ancestorIndex(1) #Pega o valor id de ue
*.ue[*].app[0].localPort = 4888
*.ue[*].app[0].startTime = 0.01s
#*.server.app[0..199].typename="VoIPReceiver"
*.server.app[0..1].typename="VoIPReceiver"
#*.server.app[0..199].localPort = 4000 + ancestorIndex(0) - 0
*.server.app[0..1].localPort = 4000 + ancestorIndex(0) - 0
# VoIP DL
#           [200..399]
*.server.app[2..3].typename="VoIPSender"
*.server.app[2..3].PacketSize = default
*.server.app[2..3].destAddress = "ue[" + string(ancestorIndex(0) - 200) + "]"
*.server.app[2..3].destPort = 3000
*.server.app[2..3].localPort = 3088 + ancestorIndex(0)
*.server.app[2..3].startTime = 0.01s
*.ue[*].app[1].typename="VoIPReceiver"
*.ue[*].app[1].localPort = 3000

############### Channel Control ###############
**.propagationModel = "LogNormalShadow"

