*.ue*[*].numApps = 2
*.server.numApps = 2 * 1 * 7

# VoIP UL
*.ue0[*].app[0].typename="VoIPSender"
*.ue0[*].app[0].PacketSize = default
*.ue0[*].app[0].destAddress = "server"
