[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = false
seed-set = ${repetition}

############### Resource Blocks ###############
**.numRbDl = 6
**.numRbUl = 6
**.binder.numBands = 6 # this value should be kept equal to the number of RBs

[Config Teste]
network = networks.UrbanMacro
sim-time-limit = 10s
repeat = 10
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 123

output-scalar-file = ${resultdir}/${configname}/${sched}-${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${sched}-${repetition}.vec
**.vector-recording = false

############### Micro Cell ###############
**.microCell0.cellInfo.microCell = true
**.microCell1.cellInfo.microCell = true
**.microCell2.cellInfo.microCell = true
**.microCell3.cellInfo.microCell = true
**.microCell4.cellInfo.microCell = true
**.microCell5.cellInfo.microCell = true
**.microCell6.cellInfo.microCell = true

############### Transmission Power ###############
**.ueTxPower = 24
**.eNodeBTxPower = 46
**.microTxPower = 30

############### UEs ###############
**.numUe = 30

