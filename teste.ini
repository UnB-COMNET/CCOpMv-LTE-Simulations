[General]
sim-time-limit = 10s

############### Statistics ###############
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = False
seed-set = ${repetition}
**.vector-recording = false

############### Transmission Power ###############
**.ueTxPower = 24
**eNodeBTxPower = 46

############### Resource Blocks ###############
**.numRbDl = 6
**.numRbUl = 6
**.binder.numBands = 6 # this value should be kept equal to the number of RBs

[Config Teste]
network = networks.SimpleNet
sim-time-limit = 10s
repeat = 10
seed-set = ${repetition}
num-rngs = 2
seed-1-mt = 123

output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
**.vector-recording = False

############### UEs ###############

# Conecting UEs to eNodeB
**.ue[*].macCellId = 1
**.ue[*].masterId = 1

# Scheduler
**.schedulingDisciplineUl = ${sched= "MAXCI", "DRR", "PF", "ALLOCATOR_BESTFIT"}
**.schedulingDisciplineDl = ${sched}

############### Mobility ###############

# eNodeB
*.eNB.mobility.initialX = 500m
*.eNB.mobility.initialY = 500m
*.eNB.mobility.initFromDisplayString = False
*.eNB.mobility.constraintAreaMaxX = +inf m
*.eNB.mobility.constraintAreaMaxY = +inf m
*.eNB.mobility.constraintAreaMaxZ = +inf m
*.eNB.mobility.constraintAreaMinX = -inf m
*.eNB.mobility.constraintAreaMinY = -inf m
*.eNB.mobility.constraintAreaMinZ = -inf m

# UEs
*.ue[*].mobilityType = "StationaryMobility"
*.ue[*].mobility.initialX = 500m
*.ue[*].mobility.initialY = 500m
*.ue[*].mobility.initFromDisplayString = False
*.ue[*].mobility.constraintAreaMaxX = +inf m
*.ue[*].mobility.constraintAreaMaxY = +inf m
*.ue[*].mobility.constraintAreaMaxZ = +inf m
*.ue[*].mobility.constraintAreaMinX = -inf m
*.ue[*].mobility.constraintAreaMinY = -inf m
*.ue[*].mobility.constraintAreaMinZ = -inf m
